name: Build & Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  # Updated to point to Docker Hub. Change 'shoutrrr-logger' to your target repo name if needed.
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/shoutrrr-logger

jobs:
  build-publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    # Removed packages: write permission as it is not needed for Docker Hub

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Set up QEMU to enable multi-platform emulation (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Updated authentication to target Docker Hub using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve metadata
        id: meta
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "git_hash=${GIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Docker image tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # branch builds → :main
            type=ref,event=branch
            # PR builds → :pr-42
            type=ref,event=pr
            # semver tag v1.2.3 → :1.2.3 and :1.2 and :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always tag the commit SHA
            type=sha,prefix=sha-,format=short
            # latest only on default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # Added full platform compilation tracking
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          build-args: |
            GIT_HASH=${{ steps.meta.outputs.git_hash }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            APP_VERSION=${{ steps.tags.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/shoutrrr-logger
          readme-filepath: ./DOCKER_HUB.md
          short-description: "Self-hosted notification logging service for shoutrrr"

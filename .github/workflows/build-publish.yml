name: Build & Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  # Change this to your registry + image name, e.g.:
  #   ghcr.io/your-org/shoutrrr-logger
  #   docker.io/your-user/shoutrrr-logger
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shoutrrr-logger

jobs:
  build-publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve metadata
        id: meta
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "git_hash=${GIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Docker image tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # branch builds → :main  / :my-branch
            type=ref,event=branch
            # PR builds → :pr-42
            type=ref,event=pr
            # semver tag v1.2.3 → :1.2.3 and :1.2 and :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always tag the commit SHA
            type=sha,prefix=sha-,format=short
            # latest only on default branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          build-args: |
            GIT_HASH=${{ steps.meta.outputs.git_hash }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

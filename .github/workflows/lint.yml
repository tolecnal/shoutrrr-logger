name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-backend:
    name: Backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff via venv
        run: |
          python -m venv .venv
          .venv/bin/pip install ruff

      - name: Lint
        run: .venv/bin/ruff check backend/

      - name: Format check
        run: .venv/bin/ruff format --check backend/ --exclude backend/build/

  lint-frontend:
    name: Frontend (ESLint + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript type-check
        run: pnpm exec tsc --noEmit

      # Advisory only — translation coverage is rarely 100% and missing
      # translations should never block the pipeline. Surfaces parity gaps and
      # undefined-key references as a warning. See TRANSLATING.md.
      - name: i18n coverage (advisory)
        run: pnpm i18n:check
        continue-on-error: true

  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies via venv
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[test]"

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short

  alembic-migrations:
    name: Alembic migrations (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shoutrrr_logger
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/shoutrrr_logger
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies via venv
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[test]"

      - name: Apply migrations to a fresh database
        run: .venv/bin/alembic upgrade head

      - name: Check for model/migration drift
        run: .venv/bin/alembic check

      - name: Verify downgrade and re-upgrade
        run: |
          .venv/bin/alembic downgrade base
          .venv/bin/alembic upgrade head

  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Resolved in the host shell before being passed into the build.
        # Run:  export GIT_HASH=$(git rev-parse --short HEAD) && docker compose build
        # Or just use the Makefile target `make build` which sets this automatically.
        GIT_HASH: ${GIT_HASH:-dev}
        BUILD_TIME: ${BUILD_TIME:-}
    restart: unless-stopped
    # Not published to the host — only the nginx reverse proxy talks to these
    # ports (over the internal compose network). All external traffic must go
    # through nginx; the app and database are otherwise unreachable from outside.
    expose:
      - "4000"   # Next.js frontend
      - "9000"   # FastAPI backend / Swagger UI at /api/docs
    env_file:
      - .env
    environment:
      # Override specific values here if needed; all are also configurable via .env
      WORKERS: "${WORKERS:-4}"
      # Used by Next.js rewrites to proxy /api/* → FastAPI (internal container address)
      BACKEND_URL: "http://localhost:9000"
      # Inside Docker the DB host is the service name, not localhost.
      # This overrides whatever DATABASE_URL is set to in .env.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-shoutrrr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shoutrrr_logger}?ssl=disable"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.31.1-trixie
    restart: unless-stopped
    # The only service exposed to the outside world. Terminates TLS and
    # routes /api/* to the backend, everything else to the frontend.
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_SERVER_NAME: "${NGINX_SERVER_NAME:?NGINX_SERVER_NAME is required}"
    volumes:
      - ./nginx-config/templates:/etc/nginx/templates:ro
      # TLS certificate/key are expected to already exist on the host.
      # Mount only this site's files — not all of /etc/ssl/private, which
      # would hand the container every private key on the host.
      - /etc/ssl/certs/${NGINX_SERVER_NAME}.crt:/etc/ssl/certs/${NGINX_SERVER_NAME}.crt:ro
      - /etc/ssl/private/${NGINX_SERVER_NAME}.key:/etc/ssl/private/${NGINX_SERVER_NAME}.key:ro
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    # Docker's default /dev/shm is 64MB, which can fail PostgreSQL parallel
    # queries; 128MB is the official postgres image recommendation.
    shm_size: 128mb
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-shoutrrr_logger}"
      POSTGRES_USER: "${POSTGRES_USER:-shoutrrr}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    # Tuning aligned with this app's workload: append-heavy writes (one
    # api_metric_logs row per API request, notification ingestion), trigram
    # GIN index searches, and hourly bulk retention DELETEs. Defaults below
    # assume a host with ~2GB RAM available to PostgreSQL; see .env.example
    # for recommended values on 4GB/8GB hosts. All overridable via .env.
    command:
      - postgres
      # Cache: postgres' own page cache; ~25% of available RAM.
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      # Planner hint (allocates nothing): total RAM available for caching,
      # including the OS page cache; ~50-75% of available RAM.
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}
      # Per-sort/hash memory for search ordering and stats aggregations.
      - -c
      - work_mem=${PG_WORK_MEM:-16MB}
      # Vacuum and (GIN) index maintenance memory.
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      # SSD cost model (default 4.0 assumes spinning disks) — makes the
      # planner actually use the trigram GIN indexes for searches.
      - -c
      - random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      # Vacuum at 5% dead tuples (default 20%) and let it work faster, so
      # the hourly retention purges don't leave tables bloated for long.
      - -c
      - autovacuum_vacuum_scale_factor=${PG_AUTOVACUUM_SCALE_FACTOR:-0.05}
      - -c
      - autovacuum_vacuum_cost_limit=${PG_AUTOVACUUM_COST_LIMIT:-1000}
      # Smoother checkpoints and smaller WAL volume for the append-heavy
      # ingestion/metrics write pattern.
      - -c
      - wal_compression=${PG_WAL_COMPRESSION:-on}
      - -c
      - max_wal_size=${PG_MAX_WAL_SIZE:-2GB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shoutrrr} -d ${POSTGRES_DB:-shoutrrr_logger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres is NOT exposed externally by default.
    # Uncomment the lines below if you need direct DB access:
    # ports:
    #   - "5432:5432"

volumes:
  postgres_data:

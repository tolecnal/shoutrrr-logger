# ---------------------------------------------------------------------------
# shoutrrr-logger — GitLab CI/CD
#
# Mirrors the GitHub Actions workflows (lint.yml + docker-publish.yml).
#
# Stages:
#   lint    — ruff (Python) + ESLint + tsc (TypeScript)
#   test    — pytest (Python) + vitest (TypeScript)
#   build   — multi-platform Docker image pushed to Docker Hub
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DOCKERHUB_USER     Docker Hub username
#   DOCKERHUB_TOKEN    Docker Hub access token (read/write scope)
# ---------------------------------------------------------------------------

default:
  image: docker:27
  services:
    - docker:27-dind

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE: $DOCKERHUB_USER/shoutrrr-logger

stages:
  - lint
  - test
  - build

# ---------------------------------------------------------------------------
# Lint — Python (ruff)
# ---------------------------------------------------------------------------
lint:backend:
  stage: lint
  image: python:3.12-slim
  services: []
  before_script:
    - pip install ruff --quiet
  script:
    - ruff check backend/
    - ruff format --check backend/ --exclude backend/build/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Lint — Frontend (ESLint + tsc)
# ---------------------------------------------------------------------------
lint:frontend:
  stage: lint
  image: node:22-alpine
  services: []
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm lint
    - cd frontend && pnpm exec tsc --noEmit
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Test — Backend (pytest)
# ---------------------------------------------------------------------------
test:backend:
  stage: test
  image: python:3.12-slim
  services: []
  before_script:
    - cd backend && pip install -e ".[test]" --quiet
  script:
    - cd backend && pytest tests/ -v --tb=short
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Test — Frontend (vitest)
# ---------------------------------------------------------------------------
test:frontend:
  stage: test
  image: node:22-alpine
  services: []
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm test:run
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Build & Publish — Docker image (Docker Hub)
#
# Runs on pushes to the default branch, on version tags (v*.*.*),
# or when triggered manually from the GitLab UI.
#
# Tag strategy (mirrors docker/metadata-action in the GitHub workflow):
#   :sha-<short-sha>        every run
#   :<branch-name>          branch builds  (e.g. :main)
#   :latest                 default branch only
#   :1.2.3 / :1.2          semver tags (v stripped)
#
# Layer cache is stored as a separate Docker Hub tag (:buildcache) using
# BuildKit registry cache — equivalent to the GitHub Actions GHA cache.
# ---------------------------------------------------------------------------
build:publish:
  stage: build
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    # Register QEMU handlers so the buildkit daemon can emit arm64 layers
    - docker run --privileged --rm tonistiigi/binfmt --install all
    # Create a docker-container buildx builder (required for --platform + --push)
    - docker buildx create --use --name multiarch --driver docker-container
    - docker buildx inspect --bootstrap
  script:
    - GIT_HASH=$(git rev-parse --short HEAD)
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - |
      TAGS="-t ${IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"

      if [ -n "$CI_COMMIT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:${CI_COMMIT_BRANCH}"
      fi

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:latest"
      fi

      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        TAGS="$TAGS -t ${IMAGE}:${VERSION}"
        MAJOR_MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+' || true)
        [ -n "$MAJOR_MINOR" ] && TAGS="$TAGS -t ${IMAGE}:${MAJOR_MINOR}"
      fi
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg GIT_HASH="${GIT_HASH}" \
        --build-arg BUILD_TIME="${BUILD_TIME}" \
        --cache-from "type=registry,ref=${IMAGE}:buildcache" \
        --cache-to   "type=registry,ref=${IMAGE}:buildcache,mode=max" \
        --push \
        ${TAGS} \
        .
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# shoutrrr-logger — GitLab CI/CD
#
# Stages:
#   lint    — ruff (Python) + ESLint + tsc (TypeScript)
#   build   — Docker image (runs on main and version tags)
#   publish — push to the GitLab Container Registry
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   CI_REGISTRY_IMAGE  set automatically by GitLab to the project registry
#   CI_REGISTRY_USER   set automatically
#   CI_REGISTRY_PASSWORD set automatically (use $CI_JOB_TOKEN for GitLab registry)
#
# To push to Docker Hub instead, add:
#   DOCKERHUB_USER / DOCKERHUB_TOKEN  and adjust the login step below.
# ---------------------------------------------------------------------------

default:
  image: docker:26
  services:
    - docker:26-dind

variables:
  DOCKER_BUILDKIT: "1"
  IMAGE: $CI_REGISTRY_IMAGE

stages:
  - lint
  - test
  - build

# ---------------------------------------------------------------------------
# Lint — Python
# ---------------------------------------------------------------------------
lint:backend:
  stage: lint
  image: python:3.12-slim
  services: []            # no Docker-in-Docker needed
  before_script:
    - pip install ruff --quiet
  script:
    - ruff check backend/
    - ruff format --check backend/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Lint — Frontend
# ---------------------------------------------------------------------------
lint:frontend:
  stage: lint
  image: node:22-alpine
  services: []
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm lint
    - cd frontend && pnpm exec tsc --noEmit
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Test — Backend (pytest)
# ---------------------------------------------------------------------------
test:backend:
  stage: test
  image: python:3.12-slim
  services: []
  before_script:
    - cd backend && pip install -e ".[test]" --quiet
  script:
    - pytest tests/ -v --tb=short
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Test — Frontend (vitest)
# ---------------------------------------------------------------------------
test:frontend:
  stage: test
  image: node:22-alpine
  services: []
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - cd frontend && pnpm test:run
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Build & Publish — Docker image
# Runs on pushes to main and on version tags (v*.*.*).
# ---------------------------------------------------------------------------
build:publish:
  stage: build
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - GIT_HASH=$(git rev-parse --short HEAD)
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    # Determine image tags
    - |
      TAGS="-t ${IMAGE}:${CI_COMMIT_SHORT_SHA}"
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:latest"
      fi
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t ${IMAGE}:${CI_COMMIT_TAG}"
        # Also push major.minor tag for semver tags like v1.2.3
        SEMVER=$(echo "$CI_COMMIT_TAG" | grep -oP '^\d+\.\d+' || true)
        [ -n "$SEMVER" ] && TAGS="$TAGS -t ${IMAGE}:${SEMVER}"
      fi
    - |
      docker build \
        --build-arg GIT_HASH="${GIT_HASH}" \
        --build-arg BUILD_TIME="${BUILD_TIME}" \
        $TAGS \
        .
    - docker push --all-tags "$IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_PIPELINE_SOURCE == "web"'   # allow manual trigger from UI

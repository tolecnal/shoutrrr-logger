# ---------------------------------------------------------------------------
# shoutrrr-logger — GitLab CI/CD
#
# Stages:
#   lint    — ruff (Python) + ESLint + tsc (TypeScript)
#   test    — pytest (Python) + vitest (TypeScript)
#   build   — multi-platform Docker image
#               build:gitlab    automatic  → GitLab Container Registry
#               build:dockerhub manual     → Docker Hub
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DOCKERHUB_USER     Docker Hub username          (for build:dockerhub only)
#   DOCKERHUB_TOKEN    Docker Hub access token       (for build:dockerhub only)
#
# GitLab registry variables (CI_REGISTRY, CI_REGISTRY_IMAGE,
# CI_REGISTRY_USER, CI_REGISTRY_PASSWORD) are set automatically by GitLab.
# ---------------------------------------------------------------------------

default:
  image: docker:27
  services:
    - docker:27-dind

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - lint
  - test
  - build

# ---------------------------------------------------------------------------
# Lint — Python (ruff)
# ---------------------------------------------------------------------------
lint:backend:
  stage: lint
  image: python:3.12-slim
  services: []
  before_script:
    - python -m venv .venv
    - .venv/bin/pip install ruff --quiet
  script:
    - .venv/bin/ruff check backend/
    - .venv/bin/ruff format --check backend/ --exclude backend/build/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Lint — Frontend (ESLint + tsc)
# ---------------------------------------------------------------------------
lint:frontend:
  stage: lint
  image: node:22-alpine
  services: []
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - pnpm lint
    - pnpm exec tsc --noEmit
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Test — Backend (pytest)
# ---------------------------------------------------------------------------
test:backend:
  stage: test
  image: python:3.12-slim
  services: []
  before_script:
    - cd backend
    - python -m venv .venv
    - .venv/bin/pip install -e ".[test]" --quiet
  script:
    - .venv/bin/pytest tests/ -v --tb=short
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Test — Frontend (vitest)
# ---------------------------------------------------------------------------
test:frontend:
  stage: test
  image: node:22-alpine
  services: []
  before_script:
    - corepack enable
    - cd frontend && pnpm install --frozen-lockfile
  script:
    - pnpm test:run
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/
  rules:
    - when: always

# ---------------------------------------------------------------------------
# Build & Publish — GitLab Container Registry (automatic on release tags)
#
# Triggered automatically on version tags (v*.*.*) and when run from the
# GitLab UI.  Does NOT trigger on branch pushes.
#
# Tag strategy:
#   :sha-<short-sha>        every run
#   :1.2.3 / :1.2          semver tags (v stripped)
#   :latest                 semver tag builds
#
# Layer cache is stored in the GitLab registry as :buildcache.
# ---------------------------------------------------------------------------
build:gitlab:
  stage: build
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker context create tls-env
    - docker buildx create --use --name multiarch --driver docker-container tls-env
    - docker buildx inspect --bootstrap
  script:
    - GIT_HASH=$(git rev-parse --short HEAD)
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      IMAGE="$CI_REGISTRY_IMAGE"
      TAGS="-t ${IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"

      if [ -n "$CI_COMMIT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:${CI_COMMIT_BRANCH}"
      fi

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:latest"
      fi

      if [ -n "$VERSION" ]; then
        TAGS="$TAGS -t ${IMAGE}:${VERSION}"
        MAJOR_MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+' || true)
        [ -n "$MAJOR_MINOR" ] && TAGS="$TAGS -t ${IMAGE}:${MAJOR_MINOR}"
      fi
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg GIT_HASH="${GIT_HASH}" \
        --build-arg BUILD_TIME="${BUILD_TIME}" \
        --build-arg APP_VERSION="${VERSION:-dev}" \
        --cache-from "type=registry,ref=${CI_REGISTRY_IMAGE}:buildcache" \
        --cache-to   "type=registry,ref=${CI_REGISTRY_IMAGE}:buildcache,mode=max" \
        --push \
        ${TAGS} \
        .
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# Build & Publish — Docker Hub (manual trigger only)
#
# Appears as a play button in the pipeline UI after lint + test pass.
# Must be triggered explicitly — it will never run automatically.
# Requires DOCKERHUB_USER and DOCKERHUB_TOKEN CI/CD variables.
#
# Uses the same tag strategy and multi-platform target as build:gitlab.
# Layer cache is stored in Docker Hub as :buildcache.
# ---------------------------------------------------------------------------
build:dockerhub:
  stage: build
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker context create tls-env
    - docker buildx create --use --name multiarch --driver docker-container tls-env
    - docker buildx inspect --bootstrap
  script:
    - GIT_HASH=$(git rev-parse --short HEAD)
    - BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      IMAGE="${DOCKERHUB_USER}/shoutrrr-logger"
      TAGS="-t ${IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"

      if [ -n "$CI_COMMIT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:${CI_COMMIT_BRANCH}"
      fi

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        TAGS="$TAGS -t ${IMAGE}:latest"
      fi

      if [ -n "$VERSION" ]; then
        TAGS="$TAGS -t ${IMAGE}:${VERSION}"
        MAJOR_MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+' || true)
        [ -n "$MAJOR_MINOR" ] && TAGS="$TAGS -t ${IMAGE}:${MAJOR_MINOR}"
      fi
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg GIT_HASH="${GIT_HASH}" \
        --build-arg BUILD_TIME="${BUILD_TIME}" \
        --build-arg APP_VERSION="${VERSION:-dev}" \
        --cache-from "type=registry,ref=${DOCKERHUB_USER}/shoutrrr-logger:buildcache" \
        --cache-to   "type=registry,ref=${DOCKERHUB_USER}/shoutrrr-logger:buildcache,mode=max" \
        --push \
        ${TAGS} \
        .
    # Push DOCKER_HUB.md as the repository description
    - apk add --no-cache curl jq
    - |
      HUB_TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
        -H "Content-Type: application/json" \
        -d "{\"username\":\"$DOCKERHUB_USER\",\"password\":\"$DOCKERHUB_TOKEN\"}" \
        | jq -r .token)
      curl -s -X PATCH \
        "https://hub.docker.com/v2/repositories/$DOCKERHUB_USER/shoutrrr-logger/" \
        -H "Authorization: Bearer $HUB_TOKEN" \
        -H "Content-Type: application/json" \
        -d "$(jq -n --rawfile desc DOCKER_HUB.md \
              '{"full_description":$desc,"description":"Self-hosted notification logging service for shoutrrr"}')"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
